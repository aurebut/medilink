services:
  - type: web
    name: medilink-api
    runtime: node
    plan: free
    rootDir: medilink-backend-mvp
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PUBLIC_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SESSION_COOKIE_NAME
        value: medilink_session
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_MAX_AGE_DAYS
        value: 30
      - key: STORAGE_PROVIDER
        value: mock
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Medilink <no-reply@medilink.local>"
